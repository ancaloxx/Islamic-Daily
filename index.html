<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Daily - Modern Islamic Quote App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-gray-800 font-sans">
    <section class="relative overflow-hidden min-h-screen flex items-center pt-20">
        <div class="hero-bg"></div>
        
        <div class="container mx-auto px-6 grid md:grid-cols-2 gap-12 items-center relative z-10">
            <div>
                <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
                    Daily Islamic Inspiration<br> <span class="text-gray-900">for Your Day</span>
                </h1>
                <p class="text-gray-500 text-lg mb-8 max-w-md">
                    Boost your day with daily Islamic reminders.
                </p>
                <div class="flex space-x-4">
                    <button class="bg-purple-600 text-white px-8 py-3 rounded-full shadow-xl hover:scale-105 transition-transform">Download App</button>
                    <button class="border-2 border-purple-200 text-purple-600 px-8 py-3 rounded-full hover:bg-purple-50 transition">Discover more</button>
                </div>
            </div>

            <div class="flex justify-center">
                <div class="iphone-mockup app-shadow">
                    <div class="screen-content bg-blue-600">
                        <img src="screenshot.png" alt="App Screen" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="bg-white py-16 border-b border-gray-100">
        <div class="container mx-auto px-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                <div class="stat-item">
                    <div class="text-4xl font-bold text-purple-400">1,265</div>
                    <div class="text-gray-500 font-medium">Users</div>
                </div>
                <div class="stat-item">
                    <div class="text-4xl font-bold text-purple-400">1,000</div>
                    <div class="text-gray-500 font-medium">Downloads</div>
                </div>
                <div class="stat-item">
                    <div class="text-4xl font-bold text-purple-400">508</div>
                    <div class="text-gray-500 font-medium">Likes</div>
                </div>
                <div class="stat-item">
                    <div class="text-4xl font-bold text-purple-400">809</div>
                    <div class="text-gray-500 font-medium">5 Star Rating</div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
